<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunrise Intelligence Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

:root{--primary:#F97316;--dark:#0F0F0F;--text:#1a1a1a;--border:#e8e8e8;--success:#10b981;--warning:#f59e0b}

body{font-family:'Space Grotesk',sans-serif;background:#F5F5F5;color:var(--text);font-size:13px;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sb{width:240px;flex-shrink:0;background:var(--dark);color:#fff;display:flex;flex-direction:column;overflow:hidden}
.sb-header{padding:16px;border-bottom:1px solid #333}
.sb-logo{font-size:13px;font-weight:700;color:var(--primary);letter-spacing:1px}
.sb-sub{font-size:9px;color:#999;margin-top:4px;text-transform:uppercase}
.sb-client-selector{padding:12px;border-bottom:1px solid #333;display:flex;flex-direction:column;gap:8px}
.sb-client-selector label{font-size:9px;color:#666;text-transform:uppercase}
.sb-client-selector select{background:#1a1a1a;color:#fff;border:1px solid #333;padding:8px;border-radius:4px;font-size:11px}
.sb-nav{display:flex;border-bottom:1px solid #333}
.sb-nav-btn{flex:1;padding:10px;border:none;background:0;cursor:pointer;font-size:10px;color:#666;transition:.2s;text-align:center;border-bottom:2px solid transparent;font-weight:600;text-transform:uppercase}
.sb-nav-btn:hover{color:#999}
.sb-nav-btn.a{color:var(--primary);border-bottom-color:var(--primary)}
.btn-create{padding:8px;background:var(--primary);color:#fff;border:none;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:16px;font-weight:700}
.topbar-badge{font-size:9px;padding:4px 10px;border-radius:12px;background:#dbeafe;color:#1e40af}

.tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--border);gap:2px;flex-shrink:0}
.tab{padding:12px 16px;border:none;background:0;cursor:pointer;font-size:11px;color:#999;border-bottom:2px solid transparent;transition:.2s;font-weight:600;text-transform:uppercase}
.tab.a{color:var(--primary);border-bottom-color:var(--primary)}

.content{flex:1;overflow-y:auto;padding:20px;background:#FAFAFA}
.card{background:#fff;border-radius:8px;padding:16px;margin-bottom:16px;border:1px solid var(--border)}
.card-title{font-size:11px;text-transform:uppercase;color:#666;letter-spacing:.5px;margin-bottom:12px;font-weight:700}

.kpis-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.kpi-label{font-size:9px;color:#999;text-transform:uppercase;margin-bottom:6px}
.kpi-value{font-size:24px;font-weight:700;color:var(--text);line-height:1}

.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:10px;color:#666;text-transform:uppercase;margin-bottom:6px;font-weight:600}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px;border:1px solid var(--border);border-radius:4px;font-size:11px;background:#fafafa}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary);background:#fff}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.checkbox-group{display:flex;flex-direction:column;gap:8px}
.checkbox-group label{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text);cursor:pointer}

.alert{padding:12px;border-radius:6px;font-size:11px;margin-bottom:12px;border-left:3px solid;display:flex;gap:10px}
.alert-warning{background:#fffbf0;border-color:var(--warning);color:#92400e}

.btn{border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:.2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#ea6c0a}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}

.account-tag{background:var(--primary);color:#fff;padding:8px 12px;border-radius:4px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:8px}

.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
</style>
</head>
<body>

<div class="app">
  <div class="sb">
    <div class="sb-header">
      <div class="sb-logo">☀ SUNRISE</div>
      <div class="sb-sub">Intelligence Pro</div>
    </div>

    <div class="sb-client-selector">
      <label>Cliente</label>
      <select id="clientSelector" onchange="selectClient(this.value)"></select>
      <button class="btn-create" onclick="createNewClient()">➕ Crear cliente</button>
    </div>

    <div class="sb-nav">
      <button class="sb-nav-btn a" onclick="setNav('dashboard')">📊 Dashboard</button>
      <button class="sb-nav-btn" onclick="setNav('admin')">⚙️ Admin</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title" id="topbarTitle">Selecciona un cliente</div>
        <span class="topbar-badge" id="topbarBadge"></span>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG & STATE
// ═══════════════════════════════════════════════════════════════

let WINDSOR_CONFIG = {
  api_key: null,
  base_url: "https://api.windsor.ai/v1"
}

let state = {
  nav: "dashboard",
  tab: "overview",
  clientId: null,
  profiles: {}
}

// ═══════════════════════════════════════════════════════════════
// TEMPLATES
// ═══════════════════════════════════════════════════════════════

const PROFILE_TEMPLATE_ECOMMERCE = {
  name: "",
  vertical: "ecommerce",
  kpis: { primary: "ROAS", cpa_max: 30, roas_min: 4.0, margin_target: 65, repeat_rate_target: 20, budget_monthly: 5000 },
  ecommerce: { cogs_products: { "producto_1": 10 }, shipping_avg: 8, return_rate: 5 },
  accounts: { meta: { account_id: null, account_name: null }, google_ads: { account_id: null, account_name: null }, ga4: { account_id: null, account_name: null }, woocommerce: { shop_url: null, api_key: null } },
  extraction: { enabled: false, metrics: { meta: { spend: true, conversions: true, revenue: true, ctr: false, cpc: false }, google: { spend: true, conversions: true, ctr: false, cpc: false }, ga4: { sessions: true, conversion_rate: true, users: false }, woocommerce: { orders: true, revenue: true, aov: true } }, last_update: null, data: {} },
  business_rules: { alert_if_roas_below: 4.0, alert_if_cpa_above: 30, seasonal_months: ["Dec", "Jan", "Feb"], max_daily_budget: 150 },
  notes: ""
}

const PROFILE_TEMPLATE_LEADGEN = {
  name: "",
  vertical: "leadgen",
  kpis: { primary: "CPA", cpa_max: 25, lead_value_avg: 150, closing_rate: 12, budget_monthly: 3000 },
  leadgen: { sales_cycle_days: 30, closing_rate: 12 },
  accounts: { meta: { account_id: null, account_name: null }, google_ads: { account_id: null, account_name: null }, ga4: { account_id: null, account_name: null } },
  extraction: { enabled: false, metrics: { meta: { spend: true, conversions: true, ctr: false, cpc: false }, google: { spend: true, conversions: true, ctr: false, cpc: false }, ga4: { sessions: true, conversion_rate: true, users: false } }, last_update: null, data: {} },
  business_rules: { alert_if_cpa_above: 25, seasonal_months: [], max_daily_budget: 100 },
  notes: ""
}

const CLIENTS_BASE = [
  { id: "paimun", name: "Paimun Vida Natural", vertical: "ecommerce" },
  { id: "mrclick", name: "MrClick Chile", vertical: "ecommerce" },
  { id: "skinology", name: "Skinology", vertical: "ecommerce" },
  { id: "pdpaola", name: "PDPAOLA Chile", vertical: "ecommerce" },
  { id: "superzoo", name: "Superzoo", vertical: "leadgen" },
  { id: "nahmias", name: "Constructora Nahmias", vertical: "leadgen" },
  { id: "morenclinica", name: "Clínica Morén", vertical: "leadgen" }
]

const WINDSOR_ACCOUNTS = {
  meta: [
    { id: "1727276644825511", name: "Suzuval" },
    { id: "797882298782641", name: "Skinology Tarjeta Credito" },
    { id: "1256044226296652", name: "MOREN" },
    { id: "811969909144405", name: "CP - Mr Click Chile" },
    { id: "1996085000888457", name: "PDPAOLA CHILE" },
    { id: "34866045836344134", name: "ANDA.CL" }
  ],
  google_ads: [
    { id: "349-313-2594", name: "ANDA.CL" },
    { id: "700-007-5174", name: "SuperZoo" },
    { id: "755-986-1786", name: "Skinology" },
    { id: "598-125-8635", name: "Suzuval" },
    { id: "804-295-7748", name: "PDPAOLA CHILE" },
    { id: "771-109-1192", name: "PAIMUN" }
  ],
  ga4: [
    { id: "280995331", name: "Mr Click Chile - GA4" },
    { id: "426805145", name: "skinology.cl" },
    { id: "460789793", name: "Anda" }
  ]
}

// ═══════════════════════════════════════════════════════════════
// WINDSOR.AI API
// ═══════════════════════════════════════════════════════════════

async function loadConfig(){
  try {
    const response = await fetch('config.json')
    if(!response.ok) throw new Error('config.json not found')
    const config = await response.json()
    WINDSOR_CONFIG.api_key = config.windsor_api_key
    WINDSOR_CONFIG.base_url = config.windsor_base_url || "https://api.windsor.ai/v1"
    
    if(WINDSOR_CONFIG.api_key === "REEMPLAZA_ESTO_CON_TU_API_KEY_DE_WINDSOR"){
      console.warn("⚠️ Windsor API key not configured")
      return false
    }
    return true
  } catch(e){
    console.warn("⚠️ config.json not found", e)
    return false
  }
}

async function getWindsorData(connector, accountId, fields, datePreset = "last_30d"){
  try {
    // Detecta si está en producción (Vercel) o local
    const backendUrl = window.location.hostname === 'localhost' 
      ? 'http://localhost:5000'
      : 'https://sunrise-intelligence-api.railway.app' // Railway URL
    
    const url = new URL(`${backendUrl}/api/windsor/data`)
    url.searchParams.append('connector', connector)
    url.searchParams.append('account_id', accountId)
    url.searchParams.append('fields', fields.join(','))
    url.searchParams.append('date_preset', datePreset)

    const response = await fetch(url, {
      method: 'GET',
      headers: { 'Content-Type': 'application/json' }
    })

    if(!response.ok){
      const error = await response.json()
      throw new Error(error.error || `API error: ${response.status}`)
    }

    return await response.json()
  } catch(error){
    console.error('Windsor API error:', error)
    throw error
  }
}

// ═══════════════════════════════════════════════════════════════
// STATE MANAGEMENT
// ═══════════════════════════════════════════════════════════════

function loadState(){
  const stored = localStorage.getItem("sunrise_state")
  if(stored) try{ state = {...state, ...JSON.parse(stored)} }catch(e){}

  const profiles = localStorage.getItem("sunrise_profiles")
  if(profiles) try{ state.profiles = JSON.parse(profiles) }catch(e){}

  CLIENTS_BASE.forEach(c => {
    if(!state.profiles[c.id]){
      const template = c.vertical === "ecommerce" ? PROFILE_TEMPLATE_ECOMMERCE : PROFILE_TEMPLATE_LEADGEN
      state.profiles[c.id] = { ...template, id: c.id, name: c.name }
    }
  })

  saveState()
}

function saveState(){
  localStorage.setItem("sunrise_state", JSON.stringify({nav: state.nav, tab: state.tab, clientId: state.clientId}))
  localStorage.setItem("sunrise_profiles", JSON.stringify(state.profiles))
}

function getClient(){ return state.profiles[state.clientId] }
function selectClient(id){ if(!id) return; state.clientId = id; state.tab = state.nav === "dashboard" ? "overview" : "profile"; saveState(); render() }
function setNav(nav){ state.nav = nav; state.tab = nav === "dashboard" ? "overview" : "profile"; saveState(); render() }
function setTab(tab){ state.tab = tab; saveState(); render() }

function createNewClient(){
  const name = prompt("Nombre del cliente:")
  if(!name) return
  
  const vertical = confirm("¿Es Ecommerce? (OK=sí, Cancel=Lead Gen)")
  const clientId = "client_" + Date.now()
  const template = vertical ? PROFILE_TEMPLATE_ECOMMERCE : PROFILE_TEMPLATE_LEADGEN
  
  state.profiles[clientId] = {...template, id: clientId, name: name}
  CLIENTS_BASE.push({ id: clientId, name: name, vertical: vertical ? "ecommerce" : "leadgen" })
  
  state.clientId = clientId
  state.tab = "profile"
  saveState()
  render()
  alert(`✓ Cliente "${name}" creado!`)
}

// ═══════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════

function render(){
  renderSidebar()
  renderTopbar()
  renderTabs()
  renderContent()
}

function renderSidebar(){
  const selector = document.getElementById("clientSelector")
  selector.innerHTML = '<option value="">— Selecciona cliente —</option>' + CLIENTS_BASE.map(c =>
    `<option value="${c.id}" ${state.clientId === c.id ? "selected" : ""}>${c.name}</option>`
  ).join("")
}

function renderTopbar(){
  const client = getClient()
  document.getElementById("topbarTitle").textContent = client ? client.name : "Selecciona un cliente"
  const badge = document.getElementById("topbarBadge")
  if(client){
    badge.textContent = client.vertical.toUpperCase()
    badge.style.background = client.vertical === "ecommerce" ? "#dbeafe" : "#ede9fe"
    badge.style.color = client.vertical === "ecommerce" ? "#1e40af" : "#6d28d9"
  } else {
    badge.textContent = ""
  }
}

function renderTabs(){
  const client = getClient()
  if(!client){ document.getElementById("tabs").innerHTML = ""; return }

  let tabs = state.nav === "dashboard" 
    ? [{id:"overview",label:"Overview"},{id:"media",label:"Media"},{id:"social",label:"Social"}]
    : [{id:"profile",label:"Perfil"},{id:"mappings",label:"Mappings"}]

  document.getElementById("tabs").innerHTML = tabs.map(t =>
    `<button class="tab ${state.tab === t.id ? "a" : ""}" onclick="setTab('${t.id}')">${t.label}</button>`
  ).join("")
}

function renderContent(){
  const client = getClient()
  const content = document.getElementById("content")

  if(!client){
    content.innerHTML = `<div class="card"><div style="text-align:center;padding:40px;color:#999"><div style="font-size:16px;font-weight:700">👆 Selecciona un cliente</div></div></div>`
    return
  }

  if(state.nav === "dashboard" && state.tab === "overview"){
    const kpis = client.kpis
    const data = client.extraction?.data || {}
    let html = `<div class="card"><div class="card-title">KPIs (Últimos 30d)</div><div class="kpis-grid">`
    
    html += `<div class="kpi"><div class="kpi-label">Budget</div><div class="kpi-value">$${kpis.budget_monthly}</div></div>`
    
    if(data.meta){
      html += `<div class="kpi"><div class="kpi-label">Meta Spend</div><div class="kpi-value">$${Number(data.meta.spend || 0).toFixed(0)}</div></div>`
    }
    if(data.google){
      html += `<div class="kpi"><div class="kpi-label">Google Spend</div><div class="kpi-value">$${Number(data.google.spend || 0).toFixed(0)}</div></div>`
    }
    
    html += `</div><div class="alert alert-warning"><span>📊</span><span>Datos de Windsor.ai (últimos 30d)</span></div></div>`
    
    if(client.accounts?.meta?.account_id || client.accounts?.google_ads?.account_id){
      html += `<div class="card"><div class="card-title">Cuentas Vinculadas</div><div style="display:flex;gap:8px;flex-wrap:wrap">`
      if(client.accounts?.meta?.account_id) html += `<div class="account-tag">✓ Meta: ${client.accounts.meta.account_name}</div>`
      if(client.accounts?.google_ads?.account_id) html += `<div class="account-tag">✓ Google: ${client.accounts.google_ads.account_name}</div>`
      html += `</div></div>`
    }

    content.innerHTML = html
  } else if(state.nav === "admin" && state.tab === "profile"){
    const isEcommerce = client.vertical === "ecommerce"
    const accounts = client.accounts || {}
    
    let html = `
      <div class="card">
        <div class="card-title">Configuración</div>
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" value="${client.name}" onchange="updateField('name', this.value)">
        </div>
        <div class="form-group">
          <label>Vertical</label>
          <select onchange="changeVertical(this.value)">
            <option value="ecommerce" ${isEcommerce ? "selected" : ""}>Ecommerce</option>
            <option value="leadgen" ${!isEcommerce ? "selected" : ""}>Lead Gen</option>
          </select>
        </div>
        
        <hr style="margin:20px 0;border:none;border-top:1px solid var(--border)">
        
        <div class="card-title">🔗 Vincular Cuentas Windsor</div>
        <div style="background:#f9f9f9;padding:16px;border-radius:6px;margin-bottom:16px">
          <div style="margin-bottom:14px">
            <div style="font-weight:600;font-size:11px;color:#666;margin-bottom:8px">META ADS</div>
            <select onchange="selectAccount('meta', this.value, this.options[this.selectedIndex].text)">
              <option value="">— Seleccionar Meta —</option>
              ${WINDSOR_ACCOUNTS.meta.map(acc => `<option value="${acc.id}" ${accounts.meta?.account_id === acc.id ? "selected" : ""}>${acc.name}</option>`).join("")}
            </select>
          </div>
          
          <div style="margin-bottom:14px">
            <div style="font-weight:600;font-size:11px;color:#666;margin-bottom:8px">GOOGLE ADS</div>
            <select onchange="selectAccount('google_ads', this.value, this.options[this.selectedIndex].text)">
              <option value="">— Seleccionar Google —</option>
              ${WINDSOR_ACCOUNTS.google_ads.map(acc => `<option value="${acc.id}" ${accounts.google_ads?.account_id === acc.id ? "selected" : ""}>${acc.name}</option>`).join("")}
            </select>
          </div>
          
          <div style="margin-bottom:14px">
            <div style="font-weight:600;font-size:11px;color:#666;margin-bottom:8px">GA4</div>
            <select onchange="selectAccount('ga4', this.value, this.options[this.selectedIndex].text)">
              <option value="">— Seleccionar GA4 —</option>
              ${WINDSOR_ACCOUNTS.ga4.map(acc => `<option value="${acc.id}" ${accounts.ga4?.account_id === acc.id ? "selected" : ""}>${acc.name}</option>`).join("")}
            </select>
          </div>
        </div>
        
        <hr style="margin:20px 0;border:none;border-top:1px solid var(--border)">
        
        <div class="card-title">🔄 Extraer Datos</div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;font-weight:600">
            <input type="checkbox" ${client.extraction?.enabled ? "checked" : ""} onchange="updateField('extraction.enabled', this.checked)">
            Extraer datos de este cliente
          </label>
        </div>
        
        ${client.extraction?.enabled ? `
          <div style="background:#f9f9f9;padding:16px;border-radius:6px;margin-bottom:16px">
            <button class="btn btn-primary" onclick="updateWindsorData()" style="width:100%">🔄 Sincronizar con Windsor</button>
            ${client.extraction.last_update ? `<div style="font-size:10px;color:#999;margin-top:8px">Última sync: ${client.extraction.last_update}</div>` : ""}
          </div>
        ` : ""}
      </div>
    `
    
    content.innerHTML = html
  } else {
    content.innerHTML = `<div class="card"><div class="card-title">${state.tab}</div><div style="padding:20px;color:#999">Sección en desarrollo</div></div>`
  }
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════

function updateField(path, value){
  const client = getClient()
  const keys = path.split(".")
  let obj = client
  for(let i = 0; i < keys.length - 1; i++){
    if(!obj[keys[i]]) obj[keys[i]] = {}
    obj = obj[keys[i]]
  }
  obj[keys[keys.length - 1]] = isNaN(value) ? value : Number(value)
  saveState()
  renderContent()
}

function changeVertical(vertical){
  const client = getClient()
  const template = vertical === "ecommerce" ? PROFILE_TEMPLATE_ECOMMERCE : PROFILE_TEMPLATE_LEADGEN
  Object.assign(client, template, {id: client.id, name: client.name})
  saveState()
  renderTabs()
  renderContent()
}

function selectAccount(source, accountId, accountName){
  const client = getClient()
  if(!client.accounts) client.accounts = {}
  client.accounts[source] = { account_id: accountId || null, account_name: accountName || null }
  saveState()
  renderContent()
}

async function updateWindsorData(){
  const client = getClient()
  if(!client.accounts?.meta?.account_id && !client.accounts?.google_ads?.account_id){
    alert("Vincula al menos una cuenta")
    return
  }

  try {
    const data = {}
    
    if(client.accounts?.meta?.account_id){
      try {
        const result = await getWindsorData('facebook', client.accounts.meta.account_id, ['spend', 'conversions'])
        data.meta = result[0] || result
      } catch(e) { data.meta = {error: e.message} }
    }
    
    if(client.accounts?.google_ads?.account_id){
      try {
        const result = await getWindsorData('google_ads', client.accounts.google_ads.account_id, ['spend', 'conversions'])
        data.google = result[0] || result
      } catch(e) { data.google = {error: e.message} }
    }

    client.extraction.data = data
    client.extraction.last_update = new Date().toLocaleString("es-CL")
    saveState()
    renderContent()
    alert("✓ Datos sincronizados")
  } catch(e) {
    alert("Error: " + e.message)
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

window.addEventListener("load", async () => {
  await loadConfig()
  loadState()
  if(!state.clientId && CLIENTS_BASE.length > 0){
    state.clientId = CLIENTS_BASE[0].id
    saveState()
  }
  render()
})
</script>

</body>
</html>
