  if(sc) state.charts.s=new Chart(sc,{type:"bar",data:{labels:names,datasets:[{label:"InversiÃ³n",data:cl.camps.map(c=>c.spend||0),backgroundColor:"rgba(249,115,22,.8)",borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},color:lblC,autoSkip:false,maxRotation:40},grid:{display:false}},y:{ticks:{font:{size:9},color:lblC},grid:{color:gridC}}}}})
  const cc=document.getElementById("cConv")
  if(cc){
    const convD=cl.camps.map(c=>c.conv!=null?c.conv:0)
    state.charts.c=new Chart(cc,{type:"bar",data:{labels:names,datasets:[{label:cl.tag==="leadgen"?"Leads":"Ventas",data:convD,backgroundColor:"rgba(59,130,246,.75)",borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},color:lblC,autoSkip:false,maxRotation:40},grid:{display:false}},y:{ticks:{font:{size:9},color:lblC},grid:{color:gridC}}}}})
  }
}

function sel(id){destroyCharts();state.clientId=id;state.tab="dashboard";render()}
function selectClient(id){sel(id)}
function setTab(t){state.tab=t;render()}
function saveMap(input){
  const{cid,raw,i}=input.dataset
  const val=input.value.trim()
  if(!val)return
  if(!state.mappings[cid])state.mappings[cid]={}
  state.mappings[cid][raw]=val
  const n=document.getElementById(`sn-${cid}-${i}`)
  if(n){n.classList.add("show");setTimeout(()=>n.classList.remove("show"),1500)}
}

render()
</script>
