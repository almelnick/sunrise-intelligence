<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunrise Intelligence Pro — Dashboard Transversal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');

:root{
  --primary:#F97316;
  --dark:#0F0F0F;
  --light:#FAFAFA;
  --text:#1a1a1a;
  --border:#e8e8e8;
  --success:#10b981;
  --warning:#f59e0b;
  --danger:#ef4444;
  --ecommerce:#2563eb;
  --leadgen:#8b5cf6;
}

body{font-family:'Space Grotesk',sans-serif;background:#F5F5F5;color:var(--text);font-size:13px;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}

.sb{width:240px;flex-shrink:0;background:var(--dark);color:#fff;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #222}
.sb-header{padding:16px;border-bottom:1px solid #333}
.sb-logo{font-size:13px;font-weight:700;color:var(--primary);letter-spacing:1px}
.sb-sub{font-size:9px;color:#999;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

.sb-client-selector{padding:12px;border-bottom:1px solid #333;display:flex;flex-direction:column;gap:8px}
.sb-client-selector label{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.5px}
.sb-client-selector select{background:#1a1a1a;color:#fff;border:1px solid #333;padding:8px;border-radius:4px;font-size:11px;cursor:pointer}

.sb-nav{display:flex;border-bottom:1px solid #333}
.sb-nav-btn{flex:1;padding:10px;border:none;background:none;cursor:pointer;font-size:10px;color:#666;transition:.2s;text-align:center;border-bottom:2px solid transparent;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.sb-nav-btn:hover{color:#999}
.sb-nav-btn.a{color:var(--primary);border-bottom-color:var(--primary)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#fff}
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#fff}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-title{font-size:16px;font-weight:700;color:var(--text)}
.topbar-badge{font-size:9px;padding:4px 10px;border-radius:12px;background:#f0f0f0;color:#666;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.topbar-badge.ecommerce{background:#dbeafe;color:#1e40af}
.topbar-badge.leadgen{background:#ede9fe;color:#6d28d9}

.tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--border);gap:2px;flex-shrink:0;background:#fff}
.tab{padding:12px 16px;border:none;background:none;cursor:pointer;font-size:11px;color:#999;border-bottom:2px solid transparent;transition:.2s;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.tab:hover{color:var(--text)}
.tab.a{color:var(--primary);border-bottom-color:var(--primary)}

.content{flex:1;overflow-y:auto;padding:20px;background:#FAFAFA}
.content-section{display:none}
.content-section.a{display:block}

.card{background:#fff;border-radius:8px;padding:16px;margin-bottom:16px;border:1px solid var(--border)}
.card-title{font-size:11px;text-transform:uppercase;color:#666;letter-spacing:.5px;margin-bottom:12px;font-weight:700}

.kpis-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.kpi-label{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-value{font-size:24px;font-weight:700;color:var(--text);line-height:1}
.kpi-subtitle{font-size:9px;color:#bbb;margin-top:6px}

.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px;border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:'IBM Plex Mono',monospace;background:#fafafa}
.form-group textarea{resize:vertical;min-height:80px}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);background:#fff}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.checkbox-group{display:flex;flex-direction:column;gap:8px}
.checkbox-group label{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text);cursor:pointer;font-weight:500}

.alert{padding:12px;border-radius:6px;font-size:11px;margin-bottom:12px;border-left:3px solid;display:flex;gap:10px}
.alert-success{background:#ecfdf5;border-color:var(--success);color:#065f46}
.alert-warning{background:#fffbf0;border-color:var(--warning);color:#92400e}

.btn{border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:.2s;letter-spacing:.5px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#ea6c0a}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}
.btn-secondary{background:#f0f0f0;color:var(--text)}
.btn-secondary:hover{background:#e0e0e0}

.table{width:100%;border-collapse:collapse;font-size:11px;margin-top:12px}
.table th{text-align:left;padding:10px;background:#f9f9f9;border-bottom:1px solid var(--border);font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.5px}
.table td{padding:10px;border-bottom:1px solid var(--border)}

.save-indicator{position:fixed;bottom:20px;right:20px;padding:12px 16px;background:var(--success);color:#fff;border-radius:6px;font-size:11px;font-weight:600;opacity:0;transition:.3s;pointer-events:none;z-index:1000}
.save-indicator.show{opacity:1;pointer-events:auto}

.account-tag{background:var(--primary);color:#fff;padding:8px 12px;border-radius:4px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:8px}
.account-tag button{background:rgba(255,255,255,0.3);border:none;color:#fff;padding:2px 6px;border-radius:2px;cursor:pointer;font-size:10px}

.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
</style>
</head>
<body>

<div class="app">
  <div class="sb">
    <div class="sb-header">
      <div class="sb-logo">☀ SUNRISE</div>
      <div class="sb-sub">Intelligence Pro</div>
    </div>

    <div class="sb-client-selector">
      <label>Cliente</label>
      <select id="clientSelector" onchange="selectClient(this.value)">
        <option value="">— Selecciona cliente —</option>
      </select>
    </div>

    <div class="sb-nav">
      <button class="sb-nav-btn a" onclick="setNav('dashboard')">📊 Dashboard</button>
      <button class="sb-nav-btn" onclick="setNav('admin')">⚙️ Admin</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title" id="topbarTitle">Selecciona un cliente</div>
        <span class="topbar-badge" id="topbarBadge"></span>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="save-indicator" id="saveIndicator">✓ Guardado</div>

const PROFILE_TEMPLATE_ECOMMERCE = {
  name: "",

  kpis: { primary: "ROAS", cpa_max: 30, roas_min: 4.0, margin_target: 65, repeat_rate_target: 20, budget_monthly: 5000 },
  ecommerce: { cogs_products: { "producto_1": 10 }, shipping_avg: 8, return_rate: 5 },
  accounts: { meta: { account_id: null, account_name: null }, google_ads: { account_id: null, account_name: null }, ga4: { account_id: null, account_name: null }, woocommerce: { shop_url: null, api_key: null } },
  extraction: { enabled: false, metrics: { meta: { spend: true, conversions: true, revenue: true, ctr: false, cpc: false, reach: false, engagement: false }, google: { spend: true, conversions: true, ctr: false, cpc: false, impressions: false }, ga4: { sessions: true, conversion_rate: true, users: false, bounce_rate: false }, woocommerce: { orders: true, revenue: true, aov: true, top_products: false, repeat_rate: false } }, last_update: null, data: {} },

  vertical: "leadgen",
  kpis: { primary: "CPA", cpa_max: 25, lead_value_avg: 150, closing_rate: 12, budget_monthly: 3000 },
  leadgen: { sales_cycle_days: 30, closing_rate: 12, lead_quality_score_target: 75 },
  accounts: { meta: { account_id: null, account_name: null }, google_ads: { account_id: null, account_name: null }, ga4: { account_id: null, account_name: null }, woocommerce: null },
  extraction: { enabled: false, metrics: { meta: { spend: true, conversions: true, revenue: false, ctr: false, cpc: false, reach: false, engagement: false }, google: { spend: true, conversions: true, ctr: false, cpc: false, impressions: false }, ga4: { sessions: true, conversion_rate: true, users: false, bounce_rate: false }, woocommerce: null }, last_update: null, data: {} },
  data_sources: ["meta", "google_ads", "ga4"],
  business_rules: { alert_if_cpa_above: 25, alert_if_closing_rate_below: 10, seasonal_months: [], max_daily_budget: 100 },
  preferences: { report_frequency: "weekly", language: "es", timezone: "America/Santiago" },
  notes: ""
}

// ═══════════════════════════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════════════════════════

let state = {
  nav: "dashboard",
  tab: "overview",
  clientId: null,
  profiles: {}
}

function loadState(){
  const stored = localStorage.getItem("sunrise_state")
  if(stored){
    try{ state = {...state, ...JSON.parse(stored)} }
    catch(e){ console.warn("Error loading state:", e) }
  }

  const storedProfiles = localStorage.getItem("sunrise_profiles")
  if(storedProfiles){
    try{ state.profiles = JSON.parse(storedProfiles) }
    catch(e){ console.warn("Error loading profiles:", e) }
  }

  CLIENTS_BASE.forEach(c => {
    if(!state.profiles[c.id]){
      const template = c.vertical === "ecommerce" ? PROFILE_TEMPLATE_ECOMMERCE : PROFILE_TEMPLATE_LEADGEN
      state.profiles[c.id] = { ...template, id: c.id, name: c.name }
    }
  })

  saveState()
}

function saveState(){
  localStorage.setItem("sunrise_state", JSON.stringify({nav: state.nav, tab: state.tab, clientId: state.clientId}))
  localStorage.setItem("sunrise_profiles", JSON.stringify(state.profiles))
  showSaveIndicator()
}

function showSaveIndicator(){
  const el = document.getElementById("saveIndicator")
  el.classList.add("show")
  setTimeout(() => el.classList.remove("show"), 2000)
}

function getClient(){ return state.profiles[state.clientId] }
function selectClient(id){ if(!id) return; state.clientId = id; state.tab = state.nav === "dashboard" ? "overview" : "profile"; saveState(); render() }
function setNav(nav){ state.nav = nav; state.tab = nav === "dashboard" ? "overview" : "profile"; saveState(); render() }
function setTab(tab){ state.tab = tab; saveState(); render() }

// ═══════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════

function renderSidebar(){
  const selector = document.getElementById("clientSelector")
  selector.innerHTML = '<option value="">— Selecciona cliente —</option>' + CLIENTS_BASE.map(c =>
    `<option value="${c.id}" ${state.clientId === c.id ? "selected" : ""}>${c.name}</option>`
  ).join("")
}

function renderTabs(){
  const client = getClient()
  if(!client){ document.getElementById("tabs").innerHTML = ""; return }

  let tabs = []
  if(state.nav === "dashboard"){
    tabs = [
      { id: "overview", label: "Overview" },
      { id: "media", label: "Media Planning" },
      { id: "social", label: "Social" }
    ]
    if(client.vertical === "ecommerce") tabs.push({ id: "product", label: "Productos" })
    else tabs.push({ id: "leads", label: "Lead Quality" })
    tabs.push({ id: "analytics", label: "Analytics" })
  } else {
    tabs = [
      { id: "profile", label: "Perfil" },
      { id: "mappings", label: "Mappings" }
    ]
  }

  document.getElementById("tabs").innerHTML = tabs.map(t =>
    `<button class="tab ${state.tab === t.id ? "a" : ""}" onclick="setTab('${t.id}')">${t.label}</button>`
  ).join("")
}

function renderTopbar(){
  const client = getClient()
  if(!client){
    document.getElementById("topbarTitle").textContent = "Selecciona un cliente"
    document.getElementById("topbarBadge").textContent = ""
    return
  }

  document.getElementById("topbarTitle").textContent = client.name
  const badge = document.getElementById("topbarBadge")
  badge.textContent = client.vertical.toUpperCase()
  badge.className = `topbar-badge ${client.vertical}`
}

function renderContent(){
  const client = getClient()
  const content = document.getElementById("content")

  if(!client){
    content.innerHTML = `<div class="card" style="text-align:center;padding:40px"><div style="font-size:18px;font-weight:700;color:#999;margin-bottom:10px">👆 Selecciona un cliente</div><div style="font-size:12px;color:#bbb">Elige un cliente del menú para empezar</div></div>`
    return
  }

  if(state.nav === "dashboard"){
    if(state.tab === "overview") renderDashboardOverview(client, content)
    else if(state.tab === "media") renderMediaPlanning(client, content)
    else if(state.tab === "social") renderSocial(client, content)
    else if(state.tab === "product") renderProducts(client, content)
    else if(state.tab === "leads") renderLeads(client, content)
    else if(state.tab === "analytics") renderAnalytics(client, content)
  } else {
    if(state.tab === "profile") renderProfile(client, content)
    else if(state.tab === "mappings") renderMappings(client, content)
  }
}

function renderDashboardOverview(client, container){
  const kpis = client.kpis
  const isEcommerce = client.vertical === "ecommerce"
  const extractedData = client.extraction?.data || {}

  let html = `
    <div class="card">
      <div class="card-title">KPIs Principales (Últimos 30 días)</div>
      <div class="kpis-grid">
        <div class="kpi">
          <div class="kpi-label">Budget Mensual</div>
          <div class="kpi-value">$${kpis.budget_monthly.toLocaleString()}</div>
        </div>
  `

  if(extractedData.meta){
    html += `
      <div class="kpi">
        <div class="kpi-label">Meta Spend</div>
        <div class="kpi-value">$${Number(extractedData.meta.spend).toFixed(0)}</div>
        <div class="kpi-subtitle">${extractedData.meta.conversions || "—"} conversiones</div>
      </div>
    `
  }

  if(extractedData.google){
    html += `
      <div class="kpi">
        <div class="kpi-label">Google Spend</div>
        <div class="kpi-value">$${Number(extractedData.google.spend).toFixed(0)}</div>
        <div class="kpi-subtitle">${extractedData.google.conversions || "—"} conversiones</div>
      </div>
    `
  }

  if(extractedData.woocommerce){
    html += `
      <div class="kpi">
        <div class="kpi-label">WooCommerce Revenue</div>
        <div class="kpi-value">$${Number(extractedData.woocommerce.revenue).toFixed(0)}</div>
        <div class="kpi-subtitle">${extractedData.woocommerce.orders} órdenes</div>
      </div>
    `
  }

  if(!extractedData.meta && !extractedData.google){
    html += `
      <div class="kpi" style="grid-column:span 2;opacity:.5">
        <div class="kpi-label">Datos no disponibles</div>
        <div style="font-size:11px;color:#999;margin-top:6px">Vincul cuentas y actualiza datos</div>
      </div>
    `
  }

  html += `
      </div>
    </div>

    <div class="alert alert-warning">
      <span>📊</span>
      <span>Datos en vivo desde Windsor.ai (últimas 24 horas)</span>
    </div>

    <div class="card">
      <div class="card-title">Cuentas Vinculadas</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${client.accounts?.meta?.account_id ? `<div class="account-tag" style="background:var(--primary)">✓ Meta: ${client.accounts.meta.account_name}</div>` : ""}
        ${client.accounts?.google_ads?.account_id ? `<div class="account-tag" style="background:#4285F4">✓ Google: ${client.accounts.google_ads.account_name}</div>` : ""}
        ${client.accounts?.ga4?.account_id ? `<div class="account-tag" style="background:#EA8208">✓ GA4: ${client.accounts.ga4.account_name}</div>` : ""}
        ${!client.accounts?.meta?.account_id && !client.accounts?.google_ads?.account_id ? `<div style="color:#999;font-size:11px">Sin cuentas vinculadas</div>` : ""}
      </div>
    </div>
  `

  container.innerHTML = html
}

function renderMediaPlanning(client, container){
  container.innerHTML = `<div class="card"><div class="card-title">Media Planning</div><div style="padding:20px;text-align:center;color:#999"><div style="font-size:14px;margin-bottom:10px">📊 Análisis por canal</div></div></div>`
}

function renderSocial(client, container){
  container.innerHTML = `<div class="card"><div class="card-title">Social & Community</div><div style="padding:20px;text-align:center;color:#999"><div style="font-size:14px;margin-bottom:10px">📱 Engagement y reach</div></div></div>`
}

function renderProducts(client, container){
  const products = client.ecommerce?.cogs_products || {}
  let html = `<div class="card"><div class="card-title">Productos & COGS</div><table class="table"><thead><tr><th>Producto</th><th>COGS</th></tr></thead><tbody>`
  Object.entries(products).forEach(([name, cogs]) => {
    html += `<tr><td>${name}</td><td>$${cogs}</td></tr>`
  })
  html += `</tbody></table></div>`
  container.innerHTML = html
}

function renderLeads(client, container){
  container.innerHTML = `<div class="card"><div class="card-title">Lead Quality Analysis</div><div style="padding:20px;text-align:center;color:#999">Lead scoring y quality</div></div>`
}

function renderAnalytics(client, container){
  container.innerHTML = `<div class="card"><div class="card-title">Analytics & Attribution</div><div style="padding:20px;text-align:center;color:#999">Funnel y atribución multi-touch</div></div>`
}

function renderProfile(client, container){
  const isEcommerce = client.vertical === "ecommerce"
  const extraction = client.extraction || {}
  const accounts = client.accounts || {}

  let html = `
    <div class="card">
      <div class="card-title">Configuración del Cliente</div>

      <div class="form-group">
        <label>Nombre</label>
        <input type="text" value="${client.name}" onchange="updateClientField('name', this.value)">
      </div>

      <div class="form-group">
        <label>Tipo de Cliente</label>

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════

function updateClientField(path, value){
  const client = getClient()
  const keys = path.split(".")
  let obj = client
  for(let i = 0; i < keys.length - 1; i++){
    if(!obj[keys[i]]) obj[keys[i]] = {}
    obj = obj[keys[i]]
  }
  obj[keys[keys.length - 1]] = isNaN(value) ? value : Number(value)
  saveState()
  renderContent()
}

function changeVertical(vertical){
  const client = getClient()
  const template = vertical === "ecommerce" ? PROFILE_TEMPLATE_ECOMMERCE : PROFILE_TEMPLATE_LEADGEN
  Object.assign(client, template, {id: client.id, name: client.name})
  saveState()
  renderTabs()
  renderContent()
}

function selectAccount(source, accountId, accountName){
  const client = getClient()
  if(!client.accounts) client.accounts = {}
  client.accounts[source] = { account_id: accountId, account_name: accountName }
  saveState()
  renderContent()
}

function updateMetric(source, metric, checked){
  const client = getClient()
  if(!client.extraction) client.extraction = {}
  if(!client.extraction.metrics) client.extraction.metrics = {}
  if(!client.extraction.metrics[source]) client.extraction.metrics[source] = {}
  client.extraction.metrics[source][metric] = checked
  saveState()
}

async function updateWindsorData(){
  const client = getClient()
  if(!client.extraction?.enabled){
    alert("Habilita la extracción de datos primero")
    return
  }

  if(!client.accounts?.meta?.account_id && !client.accounts?.google_ads?.account_id){
    alert("Vincula primero al menos una cuenta (Meta o Google)")
    return
  }

  const btn = document.getElementById("btnUpdateWindsor")
  if(btn) btn.disabled = true
  if(btn) btn.textContent = "⏳ Sincronizando..."

  try {
    const data = {}

    // Traer datos de META ADS (si está configurado)
    if(client.accounts?.meta?.account_id && client.extraction.metrics?.meta){
      try {
        const metaFields = []
        if(client.extraction.metrics.meta.spend) metaFields.push("spend")
        if(client.extraction.metrics.meta.conversions) metaFields.push("conversions")
        if(client.extraction.metrics.meta.revenue) metaFields.push("revenue")
        if(client.extraction.metrics.meta.ctr) metaFields.push("ctr")
        if(client.extraction.metrics.meta.cpc) metaFields.push("cpc")
        
        if(metaFields.length > 0){
          const response = await sendPrompt(`
            Trae datos de Windsor.ai para Meta Ads:
            - Account ID: ${client.accounts.meta.account_id}
            - Campos: ${metaFields.join(", ")}
            - Período: últimos 30 días
            - Usa la función Windsor.ai:get_data con date_preset="last_30d"
            
            Devuelve SOLO los datos en formato JSON, sin explicaciones.
          `)
          
          // El response es texto, parsea como JSON
          try {
            data.meta = JSON.parse(response.split("```json")[1]?.split("```")[0] || response)
          } catch(e){
            data.meta = { error: "No se pudo parsear respuesta" }
          }
        }
      } catch(e){
        console.warn("Error trayendo datos Meta:", e)
        data.meta = null
      }
    }

    // Traer datos de GOOGLE ADS (si está configurado)
    if(client.accounts?.google_ads?.account_id && client.extraction.metrics?.google){
      try {
        const googleFields = []
        if(client.extraction.metrics.google.spend) googleFields.push("spend")
        if(client.extraction.metrics.google.conversions) googleFields.push("conversions")
        if(client.extraction.metrics.google.ctr) googleFields.push("ctr")
        if(client.extraction.metrics.google.cpc) googleFields.push("cpc")
        
        if(googleFields.length > 0){
          const response = await sendPrompt(`
            Trae datos de Windsor.ai para Google Ads:
            - Account ID: ${client.accounts.google_ads.account_id}
            - Campos: ${googleFields.join(", ")}
            - Período: últimos 30 días
            - Usa la función Windsor.ai:get_data con date_preset="last_30d"
            
            Devuelve SOLO los datos en formato JSON, sin explicaciones.
          `)
          
          try {
            data.google = JSON.parse(response.split("```json")[1]?.split("```")[0] || response)
          } catch(e){
            data.google = { error: "No se pudo parsear respuesta" }
          }
        }
      } catch(e){
        console.warn("Error trayendo datos Google:", e)
        data.google = null
      }
    }

    // Traer datos de GA4 (si está configurado)
    if(client.accounts?.ga4?.account_id && client.extraction.metrics?.ga4){
      try {
        const ga4Fields = []
        if(client.extraction.metrics.ga4.sessions) ga4Fields.push("sessions")
        if(client.extraction.metrics.ga4.conversion_rate) ga4Fields.push("conversion_rate")
        
        if(ga4Fields.length > 0){
          const response = await sendPrompt(`
            Trae datos de Windsor.ai para GA4:
            - Account ID: ${client.accounts.ga4.account_id}
            - Campos: ${ga4Fields.join(", ")}
            - Período: últimos 30 días
            - Usa la función Windsor.ai:get_data con date_preset="last_30d"
            
            Devuelve SOLO los datos en formato JSON, sin explicaciones.
          `)
          
          try {
            data.ga4 = JSON.parse(response.split("```json")[1]?.split("```")[0] || response)
          } catch(e){
            data.ga4 = { error: "No se pudo parsear respuesta" }
          }
        }
      } catch(e){
        console.warn("Error trayendo datos GA4:", e)
        data.ga4 = null
      }
    }

    client.extraction.data = data
    client.extraction.last_update = new Date().toLocaleString("es-CL")
    saveState()
    renderContent()

    if(btn) btn.textContent = "✓ Sincronizado"
    setTimeout(() => {
      if(btn) btn.textContent = "🔄 Sincronizar con Windsor"
      if(btn) btn.disabled = false
    }, 2000)

  } catch(error) {
    alert("Error: " + error.message)
    if(btn) btn.textContent = "🔄 Sincronizar con Windsor"
    if(btn) btn.disabled = false
  }
}

function render(){
  renderSidebar()
  renderTopbar()
  renderTabs()
  renderContent()
}

window.addEventListener("load", () => {
  loadState()
  if(!state.clientId && CLIENTS_BASE.length > 0){
    state.clientId = CLIENTS_BASE[0].id
    saveState()
  }
  render()
})
</script>
